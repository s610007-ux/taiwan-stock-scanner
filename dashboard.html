<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股掃描儀表板｜雙策略版</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg:       #0a0e14;
    --panel:    #0f1520;
    --border:   #1d2a3a;
    --accent:   #00d4aa;
    --accent2:  #0099ff;
    --orange:   #ff8c42;
    --red:      #ff4d6a;
    --yellow:   #f5c842;
    --green:    #39d353;
    --text:     #c8d8e8;
    --dim:      #4a6070;
    --card-bg:  #111a26;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans TC',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  /* Header */
  header {
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 32px; border-bottom:1px solid var(--border);
    background:var(--panel); position:sticky; top:0; z-index:100;
  }
  .logo { display:flex; align-items:center; gap:12px; }
  .logo-icon {
    width:36px; height:36px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:18px;
  }
  .logo h1 { font-size:16px; font-weight:700; letter-spacing:.08em; color:#fff; }
  .logo span { font-size:11px; color:var(--dim); font-family:'JetBrains Mono',monospace; }
  .header-right { display:flex; align-items:center; gap:16px; }
  .scan-time { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--dim); }
  .refresh-btn {
    padding:8px 16px; background:transparent; border:1px solid var(--accent);
    border-radius:6px; color:var(--accent); font-size:12px; font-family:'Noto Sans TC',sans-serif;
    cursor:pointer; transition:all .2s; letter-spacing:.05em;
  }
  .refresh-btn:hover { background:var(--accent); color:var(--bg); }

  /* Stats Bar */
  .stats-bar { display:flex; gap:1px; background:var(--border); border-bottom:1px solid var(--border); }
  .stat-item { flex:1; padding:16px 24px; background:var(--panel); display:flex; flex-direction:column; gap:4px; }
  .stat-label { font-size:11px; color:var(--dim); text-transform:uppercase; letter-spacing:.1em; }
  .stat-value { font-size:24px; font-weight:700; font-family:'JetBrains Mono',monospace; color:#fff; }
  .stat-value.c-accent  { color:var(--accent); }
  .stat-value.c-orange  { color:var(--orange); }
  .stat-value.c-yellow  { color:var(--yellow); }
  .stat-sub { font-size:11px; color:var(--dim); font-family:'JetBrains Mono',monospace; margin-top:2px; }

  /* Tabs */
  .tabs { display:flex; gap:0; border-bottom:1px solid var(--border); background:var(--panel); padding:0 32px; }
  .tab {
    padding:14px 24px; font-size:13px; font-weight:500; cursor:pointer;
    border-bottom:2px solid transparent; color:var(--dim); transition:all .2s; letter-spacing:.04em;
    display:flex; align-items:center; gap:8px;
  }
  .tab:hover { color:var(--text); }
  .tab.active { color:#fff; border-bottom-color:var(--accent); }
  .tab.active.s2 { border-bottom-color:var(--orange); }
  .tab-badge {
    font-family:'JetBrains Mono',monospace; font-size:11px; padding:2px 8px;
    border-radius:20px; background:rgba(0,212,170,.12); border:1px solid rgba(0,212,170,.3); color:var(--accent);
  }
  .tab.s2 .tab-badge { background:rgba(255,140,66,.12); border-color:rgba(255,140,66,.3); color:var(--orange); }

  /* Main */
  main { padding:24px 32px; max-width:1400px; margin:0 auto; }
  .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .section-title {
    font-size:13px; font-weight:500; color:var(--dim); text-transform:uppercase;
    letter-spacing:.12em; display:flex; align-items:center; gap:8px;
  }
  .section-title::before {
    content:''; display:inline-block; width:3px; height:14px;
    background:var(--accent); border-radius:2px;
  }
  .section-title.s2::before { background:var(--orange); }
  .count-badge {
    font-family:'JetBrains Mono',monospace; font-size:12px; padding:3px 10px;
    background:rgba(0,212,170,.12); border:1px solid rgba(0,212,170,.3);
    border-radius:20px; color:var(--accent);
  }
  .count-badge.s2 { background:rgba(255,140,66,.12); border-color:rgba(255,140,66,.3); color:var(--orange); }

  /* Strategy description */
  .strategy-desc {
    font-size:12px; color:var(--dim); padding:10px 14px;
    background:rgba(255,255,255,.03); border:1px solid var(--border);
    border-radius:8px; margin-bottom:16px; line-height:1.7;
  }
  .strategy-desc span { color:var(--text); font-weight:500; }
  .strategy-desc.s2 { border-left:3px solid var(--orange); }
  .strategy-desc.s1 { border-left:3px solid var(--accent); }

  /* Table */
  .table-wrap { border:1px solid var(--border); border-radius:10px; overflow:hidden; }
  table { width:100%; border-collapse:collapse; }
  thead tr { background:#0d1620; }
  th {
    padding:12px 16px; text-align:left; font-size:11px; font-weight:500;
    color:var(--dim); text-transform:uppercase; letter-spacing:.1em;
    border-bottom:1px solid var(--border); white-space:nowrap; cursor:pointer;
    user-select:none; transition:color .15s;
  }
  th:hover { color:var(--text); }
  tbody tr { border-bottom:1px solid rgba(29,42,58,.6); transition:background .15s; cursor:pointer; }
  tbody tr:last-child { border-bottom:none; }
  tbody tr:hover { background:rgba(0,212,170,.04); }
  td { padding:13px 16px; font-size:13px; }

  .code-cell  { font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:600; color:var(--accent2); }
  .name-cell  { color:#fff; font-weight:500; }
  .price-cell { font-family:'JetBrains Mono',monospace; font-weight:600; color:#fff; font-size:14px; }
  .mom-cell   { font-family:'JetBrains Mono',monospace; font-size:12px; }
  .mom-cell.pos { color:var(--accent); }
  .mom-cell.neg { color:var(--red); }
  .ts-cell    { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--yellow); }
  .vol-cell   { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--dim); }
  .date-cell  { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--dim); }

  /* Change % badge */
  .change-badge {
    display:inline-flex; align-items:center; gap:4px; padding:3px 10px;
    border-radius:20px; font-size:12px; font-weight:700;
    font-family:'JetBrains Mono',monospace;
    background:rgba(57,211,83,.12); border:1px solid rgba(57,211,83,.3); color:var(--green);
  }
  .change-badge.surge {
    background:rgba(255,140,66,.15); border-color:rgba(255,140,66,.4); color:var(--orange);
    animation:glow .8s ease-in-out infinite alternate;
  }
  @keyframes glow {
    from { box-shadow:0 0 4px rgba(255,140,66,.2); }
    to   { box-shadow:0 0 10px rgba(255,140,66,.5); }
  }

  .signal-badge {
    display:inline-flex; align-items:center; gap:5px; padding:3px 10px;
    border-radius:20px; font-size:11px; font-weight:600;
    background:rgba(0,212,170,.12); border:1px solid rgba(0,212,170,.35); color:var(--accent);
    letter-spacing:.05em;
  }
  .signal-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); animation:pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.7)} }

  .tw-link { color:var(--accent2); text-decoration:none; font-size:11px; opacity:.7; transition:opacity .15s; }
  .tw-link:hover { opacity:1; }

  /* Mom bar */
  .mom-bar-wrap { display:flex; align-items:center; gap:8px; }
  .mom-bar { width:50px; height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
  .mom-bar-fill { height:100%; border-radius:2px; background:linear-gradient(90deg,var(--accent2),var(--accent)); }

  /* Empty / no-file */
  .empty-state { text-align:center; padding:80px 24px; color:var(--dim); }
  .empty-icon { font-size:48px; margin-bottom:16px; }
  .empty-title { font-size:16px; margin-bottom:8px; color:var(--text); }
  .empty-sub { font-size:13px; line-height:1.6; }
  .no-file { text-align:center; padding:60px 24px; border:1px dashed var(--border); border-radius:10px; color:var(--dim); }
  .no-file h2 { font-size:16px; margin-bottom:12px; color:var(--text); }
  .no-file code { display:inline-block; background:var(--panel); border:1px solid var(--border); border-radius:6px; padding:12px 20px; font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--accent); margin:12px 0; }
  .steps { text-align:left; display:inline-block; margin-top:16px; font-size:13px; line-height:2; }
  .steps li { list-style:none; padding-left:8px; }
  .steps li::before { content:'›  '; color:var(--accent); }

  /* Tab panel */
  .tab-panel { display:none; }
  .tab-panel.active { display:block; }

  /* Scrollbar */
  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  @media (max-width:768px) {
    header { padding:14px 16px; }
    .tabs { padding:0 16px; }
    main { padding:16px; }
    .stats-bar { flex-wrap:wrap; }
    .stat-item { min-width:50%; }
    .hide-mobile { display:none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📡</div>
    <div>
      <h1>台股掃描儀表板｜雙策略版</h1>
      <span>日線掃描｜成交量前500名</span>
    </div>
  </div>
  <div class="header-right">
    <span class="scan-time" id="scanTime">—</span>
    <button class="refresh-btn" onclick="loadData()">↻ 重新載入</button>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-item">
    <div class="stat-label">掃描股票數</div>
    <div class="stat-value" id="totalScanned">—</div>
  </div>
  <div class="stat-item">
    <div class="stat-label">策略一符合</div>
    <div class="stat-value c-accent" id="s1Count">—</div>
    <div class="stat-sub">UT Bot + Squeeze 上升</div>
  </div>
  <div class="stat-item">
    <div class="stat-label">策略二符合</div>
    <div class="stat-value c-orange" id="s2Count">—</div>
    <div class="stat-sub">漲≥8% + Squeeze 反轉</div>
  </div>
  <div class="stat-item hide-mobile">
    <div class="stat-label">掃描日期</div>
    <div class="stat-value c-yellow" style="font-size:16px;margin-top:4px;" id="scanDate">—</div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" id="tab1" onclick="switchTab(1)">
    策略一 <span class="tab-badge" id="tab1Badge">0</span>
  </div>
  <div class="tab s2" id="tab2" onclick="switchTab(2)">
    策略二 <span class="tab-badge" id="tab2Badge">0</span>
  </div>
</div>

<main>
  <!-- 策略一 -->
  <div class="tab-panel active" id="panel1">
    <div class="strategy-desc s1">
      <span>策略一：UT Bot Alerts 出現買入訊號</span>，且 Squeeze Momentum <span>今日 > 昨日</span>（動量上升），且今日數值為<span>負值</span>（零軸下方回升）
    </div>
    <div class="section-header">
      <div class="section-title">符合條件股票</div>
      <span class="count-badge" id="s1ResultCount">0 檔</span>
    </div>
    <div id="s1Content"></div>
  </div>

  <!-- 策略二 -->
  <div class="tab-panel" id="panel2">
    <div class="strategy-desc s2">
      <span>策略二：當日漲幅 ≥ 8%</span>，且 Squeeze Momentum <span>今日 > 昨日</span>（動量上升），<span>今日與昨日數值皆為正值</span>（零軸上方）
    </div>
    <div class="section-header">
      <div class="section-title s2">符合條件股票</div>
      <span class="count-badge s2" id="s2ResultCount">0 檔</span>
    </div>
    <div id="s2Content"></div>
  </div>
</main>

<script>
let data1 = [], data2 = [];
let sort1 = {key:'momentum', dir:-1};
let sort2 = {key:'change_pct', dir:-1};

function fmt(n) {
  if (n >= 1e8) return (n/1e8).toFixed(1)+'億';
  if (n >= 1e4) return (n/1e4).toFixed(0)+'萬';
  return n.toLocaleString();
}

function switchTab(n) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===n-1));
  document.querySelectorAll('.tab-panel').forEach((p,i) => p.classList.toggle('active', i===n-1));
}

function renderS1(data) {
  const el = document.getElementById('s1Content');
  if (!data || data.length === 0) {
    el.innerHTML = `<div class="table-wrap"><div class="empty-state">
      <div class="empty-icon">🔍</div>
      <div class="empty-title">今日無符合策略一的股票</div>
      <div class="empty-sub">UT Bot 買入訊號 + Squeeze Momentum 上升<br>目前無個股同時滿足兩個條件</div>
    </div></div>`; return;
  }
  const maxMom = Math.max(...data.map(d => Math.abs(d.momentum)));
  const rows = data.map(d => {
    const cls = d.momentum >= 0 ? 'pos' : 'neg';
    const bar = maxMom > 0 ? Math.round(Math.abs(d.momentum)/maxMom*100) : 0;
    const market = d.market === '上櫃' ? 'TPEX' : 'TWSE';
    const tv  = `https://tw.tradingview.com/chart/?symbol=${market}:${d.code}`;
    return `<tr onclick="window.open('${tv}','_blank')">
      <td><span class="code-cell">${d.code}</span></td>
      <td><span class="name-cell">${d.name}</span><br><span style="font-size:10px;color:var(--dim)">${d.market||''}</span></td>
      <td><span class="price-cell">${d.price.toFixed(2)}</span></td>
      <td><span class="signal-badge"><span class="signal-dot"></span>BUY</span></td>
      <td><div class="mom-bar-wrap">
        <span class="mom-cell ${cls}">${d.momentum.toFixed(4)}</span>
        <div class="mom-bar"><div class="mom-bar-fill" style="width:${bar}%"></div></div>
      </div></td>
      <td class="hide-mobile"><span class="ts-cell">${d.ts.toFixed(2)}</span></td>
      <td class="hide-mobile"><span class="vol-cell">${fmt(d.volume)}</span></td>
      <td class="hide-mobile"><span class="date-cell">${d.date}</span></td>
      <td><a class="tw-link" href="${tv}" target="_blank" onclick="event.stopPropagation()">TView ↗</a></td>
    </tr>`;
  }).join('');
  el.innerHTML = `<div class="table-wrap"><table>
    <thead><tr>
      <th onclick="sortS1('code')">代碼</th>
      <th onclick="sortS1('name')">名稱</th>
      <th onclick="sortS1('price')">股價</th>
      <th>UT Bot</th>
      <th onclick="sortS1('momentum')">Squeeze 動量</th>
      <th class="hide-mobile" onclick="sortS1('ts')">止損線</th>
      <th class="hide-mobile" onclick="sortS1('volume')">成交量</th>
      <th class="hide-mobile" onclick="sortS1('date')">日期</th>
      <th>圖表</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function renderS2(data) {
  const el = document.getElementById('s2Content');
  if (!data || data.length === 0) {
    el.innerHTML = `<div class="table-wrap"><div class="empty-state">
      <div class="empty-icon">🚀</div>
      <div class="empty-title">今日無符合策略二的股票</div>
      <div class="empty-sub">漲幅≥8% + Squeeze Momentum 正值反轉向上<br>目前無個股同時滿足所有條件</div>
    </div></div>`; return;
  }
  const maxMom = Math.max(...data.map(d => Math.abs(d.momentum)));
  const rows = data.map(d => {
    const cls   = d.momentum >= 0 ? 'pos' : 'neg';
    const bar   = maxMom > 0 ? Math.round(Math.abs(d.momentum)/maxMom*100) : 0;
    const market = d.market === '上櫃' ? 'TPEX' : 'TWSE';
    const tv    = `https://tw.tradingview.com/chart/?symbol=${market}:${d.code}`;
    const surge = d.change_pct >= 9.5;
    return `<tr onclick="window.open('${tv}','_blank')">
      <td><span class="code-cell">${d.code}</span></td>
      <td><span class="name-cell">${d.name}</span><br><span style="font-size:10px;color:var(--dim)">${d.market||''}</span></td>
      <td><span class="price-cell">${d.price.toFixed(2)}</span></td>
      <td><span class="change-badge ${surge?'surge':''}">▲ ${d.change_pct}%</span></td>
      <td><div class="mom-bar-wrap">
        <span class="mom-cell ${cls}">${d.momentum.toFixed(4)}</span>
        <div class="mom-bar"><div class="mom-bar-fill" style="width:${bar}%"></div></div>
      </div></td>
      <td class="hide-mobile"><span class="mom-cell" style="font-size:11px;color:var(--dim)">昨:${d.prev_mom.toFixed(4)} 前:${d.prev2_mom.toFixed(4)}</span></td>
      <td class="hide-mobile"><span class="vol-cell">${fmt(d.volume)}</span></td>
      <td class="hide-mobile"><span class="date-cell">${d.date}</span></td>
      <td><a class="tw-link" href="${tv}" target="_blank" onclick="event.stopPropagation()">TView ↗</a></td>
    </tr>`;
  }).join('');
  el.innerHTML = `<div class="table-wrap"><table>
    <thead><tr>
      <th onclick="sortS2('code')">代碼</th>
      <th onclick="sortS2('name')">名稱</th>
      <th onclick="sortS2('price')">股價</th>
      <th onclick="sortS2('change_pct')">漲幅</th>
      <th onclick="sortS2('momentum')">Squeeze 今日</th>
      <th class="hide-mobile">昨日 / 前天</th>
      <th class="hide-mobile" onclick="sortS2('volume')">成交量</th>
      <th class="hide-mobile" onclick="sortS2('date')">日期</th>
      <th>圖表</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function sortS1(key) {
  if (sort1.key===key) sort1.dir*=-1; else { sort1.key=key; sort1.dir=-1; }
  data1.sort((a,b)=> typeof a[key]==='string' ? a[key].localeCompare(b[key])*sort1.dir : (a[key]-b[key])*sort1.dir);
  renderS1(data1);
}
function sortS2(key) {
  if (sort2.key===key) sort2.dir*=-1; else { sort2.key=key; sort2.dir=-1; }
  data2.sort((a,b)=> typeof a[key]==='string' ? a[key].localeCompare(b[key])*sort2.dir : (a[key]-b[key])*sort2.dir);
  renderS2(data2);
}

async function loadData() {
  try {
    const resp = await fetch('results.json?t=' + Date.now());
    if (!resp.ok) throw new Error('no file');
    const d = await resp.json();

    document.getElementById('scanTime').textContent = '最後掃描：' + (d.scan_time||'—');
    document.getElementById('scanDate').textContent  = d.scan_date || '—';
    document.getElementById('totalScanned').textContent = (d.total_scanned||0).toLocaleString();

    const c1 = d.matched_strategy1 || 0;
    const c2 = d.matched_strategy2 || 0;
    document.getElementById('s1Count').textContent = c1;
    document.getElementById('s2Count').textContent = c2;
    document.getElementById('tab1Badge').textContent = c1;
    document.getElementById('tab2Badge').textContent = c2;
    document.getElementById('s1ResultCount').textContent = c1 + ' 檔';
    document.getElementById('s2ResultCount').textContent = c2 + ' 檔';

    data1 = [...(d.strategy1 || [])].sort((a,b)=>b.momentum-a.momentum);
    data2 = [...(d.strategy2 || [])].sort((a,b)=>b.change_pct-a.change_pct);
    renderS1(data1);
    renderS2(data2);

  } catch(e) {
    const noFile = `<div class="no-file">
      <h2>尚未找到掃描結果</h2>
      <p>請先執行掃描程式：</p>
      <code>python scanner.py</code>
      <ul class="steps">
        <li>確認 Python 3.8+ 已安裝</li>
        <li>scanner.py 和 dashboard.html 放在同一資料夾</li>
        <li>掃描完成後重新整理此頁面</li>
      </ul>
    </div>`;
    document.getElementById('s1Content').innerHTML = noFile;
    document.getElementById('s2Content').innerHTML = noFile;
  }
}

loadData();
</script>
</body>
</html>
